services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    # For fully-local development without Neon, comment env_file out:
    # the backend then falls back to SQLite inside the container.

  # Frontend (Fase 2): run the Next.js dev server directly —
  #   cd frontend && npm install && npm run dev
  # A containerised frontend service is added when the app is production-built.
