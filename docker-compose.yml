services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    # For fully-local development without Neon, comment env_file out:
    # the backend then falls back to SQLite inside the container.

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend/public:/usr/share/nginx/html:ro
    ports:
      - "3000:80"
    # Placeholder static host — replaced by the Next.js dev server in Fase 2.
