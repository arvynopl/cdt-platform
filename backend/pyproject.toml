[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = [
    "E501",  # long lines in ported domain docstrings; formatter handles code
    "SIM108", # ternary rewrites reduce readability in ported formulas
]

[tool.ruff.lint.per-file-ignores]
# Ported thesis-defense code keeps its original layout (mid-file logger
# setup, research-script style); the golden-master parity suite is the
# authority on its behavior. New app/ code gets the full rule set.
# app/: B008 is FastAPI's documented `Depends(...)` default idiom.
"app/**" = ["B008"]
"modules/**" = ["B008", "E402"]
"scripts/**" = ["E402", "B904", "B007"]
"synthetic_validation/**" = ["B023", "E402"]
"tests/**" = ["B", "SIM", "E702", "F841"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
check_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = false
# database/models.py migrated to Mapped[]/mapped_column in Fase 1 (schema
# verified drift-free via `alembic check` + golden-master parity). modules/
# still uses research-era untyped style; it is checked behaviorally by the
# 300-test domain + parity suite. Widening to ["app", "database", "modules"]
# is a Fase 2+ cleanup.
files = ["app", "database"]
exclude = ["alembic/", "tests/"]

[[tool.mypy.overrides]]
module = ["modules.*", "config", "synthetic_validation.*"]
ignore_errors = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
filterwarnings = ["ignore::DeprecationWarning"]
