name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        # Bare invocation: scope comes from [tool.mypy] files in pyproject.toml
        # (app/ only until the Fase 1 Mapped[] model migration).
        run: mypy

      - name: Tests (incl. golden-master parity)
        run: pytest tests/ -v
